<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#0a0a0a;overflow:hidden;font-family:'Segoe UI',Roboto,Helvetica,Arial,sans-serif;-webkit-user-select:none;user-select:none;-webkit-touch-callout:none}

#overlay{position:fixed;inset:0;background:#0a0a0a;z-index:9999;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px}
#overlay svg{animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#overlay p{color:#666;font-size:13px;letter-spacing:.4px;text-align:center;padding:0 20px;font-weight:500}

#channel-list{position:fixed;inset:0;background:#0a0a0a;z-index:9998;display:none;flex-direction:column;overflow-y:auto;padding:24px 16px}
#channel-list h1{color:#fff;font-size:16px;font-weight:600;letter-spacing:.5px;margin-bottom:20px;padding-bottom:12px;border-bottom:1px solid #141414;text-align:center}
#ch-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px}
.ch-card{background:#111;border:1px solid #1a1a1a;border-radius:10px;padding:12px 10px;cursor:pointer;text-decoration:none;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:8px;transition:background .2s,border-color .2s,transform .15s;-webkit-tap-highlight-color:transparent}
.ch-card:hover{background:#161616;border-color:#262626}
.ch-card:active{transform:scale(.97);background:#1a1a1a}
.ch-card img{width:56px;height:56px;border-radius:50%;object-fit:cover;background:#1a1a1a;border:1px solid #222}
.ch-card span{color:#e5e5e5;font-size:12px;font-weight:500;line-height:1.4}

#pc{position:fixed!important;inset:0!important;width:100vw!important;height:100vh!important;background:#000!important;display:none;z-index:9990!important;align-items:center;justify-content:center;touch-action:manipulation}
.shaka-video-container {width:100%!important;height:100%!important;max-width:100%!important;max-height:100%!important;position:relative!important}

video, .shaka-video{width:100vw!important;height:100vh!important;object-fit:contain;background:#000000!important;will-change:auto!important}
video.mode-fill{object-fit:fill!important}
video.mode-cover{object-fit:cover!important}

.custom-watermark{
  position:absolute!important;
  bottom:20%!important;
  left:5%!important;
  z-index:999!important; 
  color:rgba(255,255,255,0.65)!important;
  font-size:16px!important;
  font-weight:800!important;
  font-family:'Impact', 'Arial Black', sans-serif!important;
  letter-spacing:2px!important;
  text-transform:uppercase!important;
  pointer-events:none!important;
  user-select:none!important;
  text-shadow: 2px 2px 4px rgba(0,0,0,0.9), -2px -2px 4px rgba(0,0,0,0.9), 2px -2px 4px rgba(0,0,0,0.9), -2px 2px 4px rgba(0,0,0,0.9)!important;
}

.channel-logo-overlay {
  position: absolute !important;
  top: 12px !important;
  right: 14px !important;
  z-index: 998 !important;
  width: 52px !important;
  height: 52px !important;
  border-radius: 50% !important;
  object-fit: cover !important;
  opacity: 0.85 !important;
  pointer-events: none !important;
  user-select: none !important;
  -webkit-user-select: none !important;
  box-shadow: 0px 2px 6px rgba(0,0,0,0.6);
}

.shaka-controls-container[shown="true"] ~ .channel-logo-overlay {
  top: 20px !important;
  right: 20px !important;
}

#tap-gate{position:absolute;inset:0;z-index:101;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.6);cursor:pointer;-webkit-tap-highlight-color:transparent;backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);transition:opacity .25s ease}
#tap-gate.hidden{display:none}
#tap-inner{display:flex;flex-direction:column;align-items:center;gap:14px;pointer-events:none}
#tap-btn{width:68px;height:68px;border-radius:50%;background:rgba(255,255,255,0.08);border:2px solid rgba(255,255,255,0.6);display:flex;align-items:center;justify-content:center;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);transition:transform .15s ease,background .15s ease}

#tap-btn svg{width:26px;height:26px;margin-left:3px}
#tap-label{color:rgba(255,255,255,0.85);font-size:11px;font-weight:600;letter-spacing:.8px;text-shadow:0 2px 4px rgba(0,0,0,0.8)}

#status{position:fixed;top:12px;right:12px;z-index:10000!important;padding:6px 12px;background:rgba(10,10,10,0.85);border:1px solid rgba(255,255,255,0.05);font-size:11px;font-weight:500;letter-spacing:.02em;border-radius:20px;pointer-events:none;opacity:0;transition:opacity .3s ease;max-width:260px;text-align:right;backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px)}
#status.show{opacity:1}
#status.ok{color:#38bdf8}
#status.warn{color:#fb923c}

.shaka-fit-btn, .shaka-wa-btn, .shaka-lock-btn, .shaka-timer-btn, .shaka-speed-btn, .shaka-eq-btn, .custom-q-trigger-btn{background:transparent!important;border:none!important;cursor:pointer!important;padding:0 7px!important;opacity:.85;display:flex;align-items:center;justify-content:center;height:100%;transition:opacity .15s}

.shaka-lock-btn svg{fill:#ffffff}

.shaka-speed-btn svg{fill:#38bdf8}

.shaka-controls-container button{color:#fff!important}

.q-hd-label {

<script>
(function () {
"use strict";

var MY_MAIN_JSON = "https://raw.githubusercontent.com/live4wap/links/refs/heads/main/jioo";
var COOKIE_SOURCES = {
  mb: "https://mbcookie.amitbala1993.workers.dev/",

var hdneaRegex = /__hdnea__=[a-zA-Z0-9~=\-\_\/\*]+/;

var brOverlay = document.getElementById("brightness-overlay");
var gestureHud = document.getElementById("gesture-indicator");
var currentBrightness = 100;

var audioCtx = null;

var trebleFilter = null;
var midFilter = null;

var eqModes = ["Normal", "Bass Boost", "Vocal Boost", "Treble Boost"];
var currentEqIndex = 0;

var stTimer   = null;
var globalPlayer = null;
var globalUi = null;
var sleepTimeout = null;
var cachedChannels = [];

var FIT_MODES = ["contain", "fill", "cover"];
var FIT_ICONS = {
  contain: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="2" y1="21" x2="22" y2="21"/></svg>',
  fill:    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 3h14a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2z"/><path d="M3 9h18M3 15h18M9 3v18M15 3v18"/></svg>',

};

function showStatus(msg, type, dur) {
  statusEl.textContent = msg;
  statusEl.className = "show " + (type || "ok");
  if (stTimer) clearTimeout(stTimer);
  if (dur !== 0) {
    stTimer = setTimeout(function () {
      statusEl.className = statusEl.className.replace("show", "").trim();
      stTimer = null;
    }, dur || 4000);
  }
}

function setLoadMsg(msg) { if (loadMsgEl) loadMsgEl.textContent = msg; }
function hideOverlay()   { if (overlayEl) overlayEl.style.display = "none"; }

function getChannelId() {
  return new URLSearchParams(location.search).get("id") || "";
}

function getUrlBasePath(urlStr) {
  if (!urlStr) return "";
  var clean = urlStr.split('?')[0]; 
  var match = clean.match(/bpk-tv\/[^/]+/);
  return match ? match[0] : clean;
}

function extractRawCookie(cookie) {
  return cookie && cookie.startsWith("__hdnea__=") ? cookie.substring(10) : (cookie || "");
}

function extractToken(obj, rawUrl) {
  rawUrl = rawUrl || "";
  if (!obj) return "";
  if (obj.cookie && hdneaRegex.test(obj.cookie)) return obj.cookie.match(hdneaRegex)[0];
  if (hdneaRegex.test(rawUrl)) return rawUrl.match(hdneaRegex)[0];
  for (var k in obj) {
    if (typeof obj[k] === 'string' && hdneaRegex.test(obj[k])) return obj[k].match(hdneaRegex)[0];
  }
  return "";
}

function appendCookieToUri(uri, rawCookie) {
  if (!uri || !rawCookie) return uri;
  if (uri.indexOf("__hdnea__") !== -1) return uri;
  return uri + (uri.indexOf("?") !== -1 ? "&" : "?") + "__hdnea__=" + rawCookie;
}

async function buildPlayerConfigs(targetId) {
  if (!targetId) return null;
  var baseStreamInfo = null;
  var possibleCookies = [];

  var mappingSources = [MY_MAIN_JSON, COOKIE_SOURCES.sayan, COOKIE_SOURCES.binge];
  for (var i = 0; i < mappingSources.length; i++) {
    try {
      var res = await fetch(mappingSources[i]);
      if (!res.ok) continue;
      var data = await res.json();
      var arr = Array.isArray(data) ? data : (data.channels || data.result || []);
      var found = arr.find(function(c) {
        return String(c.id) === String(targetId) || String(c.channel_id) === String(targetId) || String(c.k_id) === String(targetId);
      });
      if (found) {
        var rUrl = found.url || found.stream_url || found.channel_url || found.k_url || "";
        var kId = found.keyId || found.key_id || found.k_keyId || "";
        var ky = found.key || found.k_key || "";
        
        if (!kId || !ky) {
          var hex = [];
          for (var k in found) { if (typeof found[k] === 'string' && /^[a-fA-F0-9]{32}$/.test(found[k])) hex.push(found[k]); }
          if (hex.length >= 2) { kId = kId || hex[0]; ky = ky || hex[1]; }
        }
        baseStreamInfo = { url: rUrl.split('?')[0], keyId: kId, key: ky };
        var tk = extractToken(found, rUrl);
        if (tk) possibleCookies.push(tk);
        break;
      }
    } catch(e){}
  }

  if (!baseStreamInfo || !baseStreamInfo.url) return null;

  var streamUrl = baseStreamInfo.url;
  var myPath = getUrlBasePath(streamUrl);

  if (streamUrl.includes("jiotvmb") || streamUrl.includes("mb")) {
    try {
      var mbRes = await fetch(COOKIE_SOURCES.mb);
      if (mbRes.ok) {
        var mbData = await mbRes.json();
        if (Array.isArray(mbData) && mbData.length > 1) {
          var tk = extractToken(mbData[1]);
          if (tk) possibleCookies.push(tk);
        } else {
          var tk = extractToken(mbData);
          if (tk) possibleCookies.push(tk);
        }
      }
    } catch(e){}
  } else {
    try {
      var plRes = await fetch(COOKIE_SOURCES.pl);
      if (plRes.ok) {
        var plData = await plRes.json();
        var plChans = [].concat(plData.successful_results || [], plData.failed_results || []);
        var matched = plChans.find(function(c) {
          if (String(c.channel_id) === String(targetId)) return true;
          var u = c.error_details ? c.error_details.final_url : (c.url || "");
          return u && getUrlBasePath(u) === myPath;
        });
        if (matched) {
          var u = matched.error_details ? matched.error_details.final_url : (matched.url || "");
          var tk = extractToken(matched, u);
          if (tk) possibleCookies.push(tk);
        }
      }
    } catch(e){}
  }

  var poolFallbacks = [COOKIE_SOURCES.sayan, COOKIE_SOURCES.binge];
  for (var j = 0; j < poolFallbacks.length; j++) {
    try {
      var res = await fetch(poolFallbacks[j]);
      if (!res.ok) continue;
      var data = await res.json();
      var arr = Array.isArray(data) ? data : (data.channels || data.result || []);
      var matched = arr.find(function(c) {
        var u = c.url || c.stream_url || c.channel_url || c.k_url || "";
        return u && getUrlBasePath(u) === myPath;
      });
      if (matched) {
        var u = matched.url || matched.stream_url || "";
        var tk = extractToken(matched, u);
        if (tk && possibleCookies.indexOf(tk) === -1) possibleCookies.push(tk);
      }
    } catch(e){}
  }

  return {
    url: streamUrl,
    keyId: baseStreamInfo.keyId,
    key: baseStreamInfo.key,
    cookies: possibleCookies.length > 0 ? possibleCookies : [""]
  };
}

async function fetchInitialChannelList() {
  var channelsMap = {};
  var syncLists = [COOKIE_SOURCES.sayan, COOKIE_SOURCES.binge, MY_MAIN_JSON];
  for (var i = 0; i < syncLists.length; i++) {
    try {
      var res = await fetch(syncLists[i]);
      if (res.ok) {
        var data = await res.json();
        var arr = Array.isArray(data) ? data : (data.channels || data.result || []);
        arr.forEach(function(c) {
          var id = String(c.id || c.channel_id || c.k_id || "");
          var name = c.name || c.title || c.channel_name || ("Channel " + id);
          if (id) {
            channelsMap[id] = { id: id, name: name, logo: CUSTOM_LOGO };
          }
        });
      }
    } catch(e){}
  }
  var list = [];
  for (var key in channelsMap) { list.push(channelsMap[key]); }
  if (list.length === 0) throw new Error("Empty pool");
  return list;
}

async function enforceAutoLandscape() {
  try {
    if (screen.orientation && screen.orientation.lock) {
      await screen.orientation.lock("landscape").catch(e => console.log("Orientation bypass"));
    }

}

function initializeAudioEngine(video) {
  if (audioCtx) return;
  try {
    var AudioContext = window.AudioContext || window.webkitAudioContext;
    audioCtx = new AudioContext();
    sourceNode = audioCtx.createMediaElementSource(video);
    gainNode = audioCtx.createGain();

    bassFilter = audioCtx.createBiquadFilter();
    bassFilter.type = "lowshelf";
    bassFilter.frequency.value = 200;

    midFilter = audioCtx.createBiquadFilter();
    midFilter.type = "peaking";
    midFilter.Q.value = 1.0;
    midFilter.frequency.value = 1000;

    trebleFilter = audioCtx.createBiquadFilter();
    trebleFilter.type = "highshelf";
    trebleFilter.frequency.value = 3000;

    sourceNode.connect(bassFilter);
    bassFilter.connect(midFilter);
    midFilter.connect(trebleFilter);
    trebleFilter.connect(gainNode);
    gainNode.connect(audioCtx.destination);
  } catch (e) {
    console.error("Audio core error", e);
  }
}

function applyEqualizerPreset(mode) {
  if (!audioCtx) return;
  if (audioCtx.state === "suspended") audioCtx.resume();
  
  bassFilter.gain.value = 0;
  midFilter.gain.value = 0;
  trebleFilter.gain.value = 0;

  if (mode === "Bass Boost") {
    bassFilter.gain.value = 8;
    midFilter.gain.value = -2;
  } else if (mode === "Vocal Boost") {
    bassFilter.gain.value = -4;
    midFilter.gain.value = 7;
    trebleFilter.gain.value = 3;
  } else if (mode === "Treble Boost") {
    trebleFilter.gain.value = 8;
    midFilter.gain.value = -1;
  }
}

function setBoostedVolume(level) {
  if (gainNode && audioCtx) {
    if (audioCtx.state === "suspended") audioCtx.resume();
    gainNode.gain.value = level;
  }
}

function shakaErrStr(err) {
  if (!err) return "Unknown error";
  var cats = { 1: "Network", 2: "Text", 3: "Media", 4: "Manifest", 5: "Streaming", 6: "DRM", 7: "Player" };
  var s = (cats[err.category] || "Error") + " " + (err.category || "?") + ":" + (err.code || "?");
  if (err.data && err.data[0]) {
    var d = err.data[0];
    if (typeof d === "string" && d.length) s += " \u2014 " + d.slice(0, 80);
  }
  return s;
}

function buildYoutubeQualityMenu(player) {
  if (!player) return;
  var tracks = player.getVariantTracks();
  var uniqueTracks = [];
  var seenHeights = {};
  
  tracks.forEach(function(t) {
    if (t.height && !seenHeights[t.height]) {
      seenHeights[t.height] = true;
      uniqueTracks.push(t);
    }
  });
  
  uniqueTracks.sort((a, b) => b.height - a.height);
  var config = player.getConfiguration();
  var isAuto = config.abr.enabled;
  
  qListCont.innerHTML = "";
  
  var autoDiv = document.createElement("div");
  autoDiv.className = "q-item" + (isAuto ? " active" : "");
  autoDiv.innerHTML = "<span>Auto</span>";
  autoDiv.addEventListener("click", function(e) {
    e.stopPropagation();
    player.configure({ abr: { enabled: true } });
    qMenuEl.classList.remove("show");
    showStatus("Quality Mode: Auto", "ok", 2000);
  });
  qListCont.appendChild(autoDiv);

  uniqueTracks.forEach(function(track) {
    var div = document.createElement("div");
    var isCurrentActive = !isAuto && player.getVariantTracks().find(t => t.active && t.height === track.height);
    div.className = "q-item" + (isCurrentActive ? " active" : "");
    
    var resLabel = track.height + "p";
    var hdBadge = (track.height >= 720) ? '<span class="q-hd-label">HD</span>' : '';
    div.innerHTML = "<span>" + resLabel + hdBadge + "</span>";
    
    div.addEventListener("click", function(e) {
      e.stopPropagation();
      player.configure({ abr: { enabled: false } });
      player.selectVariantTrack(track, true);
      qMenuEl.classList.remove("show");
      showStatus("Quality Forced: " + resLabel, "ok", 2500);
    });
    qListCont.appendChild(div);
  });
}

function setupSwipeGestures(targetFrame, video) {
  var startX = 0, startY = 0;
  var startVol = 1, startBright = 100;
  var isSwiping = false;
  var mode = ""; 
  var hudTimeout = null;

  function showHud(text) {
    gestureHud.textContent = text;
    gestureHud.style.display = "flex";
    if (hudTimeout) clearTimeout(hudTimeout);
    hudTimeout = setTimeout(function() {
      gestureHud.style.display = "none";
    }, 1000);
  }

  targetFrame.addEventListener("touchstart", function(e) {
    if (isInterfaceLocked) return;
    if (e.touches.length !== 1) return;
    var isControlsActive = targetFrame.querySelector(".shaka-controls-container")?.getAttribute("shown") === "true";
    if (isControlsActive && e.target.closest(".shaka-controls-button-panel, .shaka-range-container, #custom-q-menu")) return;
    
    var touch = e.touches[0];
    startX = touch.clientX;
    startY = touch.clientY;
    startVol = video.volume;
    startBright = currentBrightness;
    isSwiping = true;
    mode = ""; 
  }, { passive: true });

  targetFrame.addEventListener("touchmove", function(e) {
    if (isInterfaceLocked) return;
    if (!isSwiping || e.touches.length !== 1) return;
    
    var touch = e.touches[0];
    var deltaX = touch.clientX - startX;
    var deltaY = touch.clientY - startY;

    if (!mode && Math.abs(deltaY) > 10 && Math.abs(deltaY) > Math.abs(deltaX)) {
      var viewWidth = targetFrame.clientWidth;
      if (startX < viewWidth / 2) mode = "brightness";
      else mode = "volume";
    }

    if (mode === "brightness") {
      var bChange = -(deltaY / targetFrame.clientHeight) * 150;
      var nextBright = Math.min(Math.max(startBright + bChange, 10), 100); 
      currentBrightness = nextBright;
      brOverlay.style.opacity = (100 - currentBrightness) / 100;
      showHud("☀ Brightness: " + Math.round(currentBrightness) + "%");
    } 
    else if (mode === "volume") {
      var vChange = -(deltaY / targetFrame.clientHeight) * 2.5; 
      var virtualVolume = video.volume + vChange; 
      var dynamicLimit = Math.min(Math.max(virtualVolume, 0), 2);
      
      if (dynamicLimit <= 1.0) {
        setBoostedVolume(1.0);
        video.volume = dynamicLimit;
        if (dynamicLimit > 0) video.muted = false;
        showHud("🔊 Volume: " + Math.round(dynamicLimit * 100) + "%");
      } else {
        initializeAudioEngine(video);
        video.volume = 1.0; 
        setBoostedVolume(dynamicLimit); 
        showHud("🔊 Volume Boost: " + Math.round(dynamicLimit * 100) + "% 🔥");
      }
    }
  }, { passive: true });

  targetFrame.addEventListener("touchend", function() {
    isSwiping = false;
    mode = "";
  });
}

async function startPlayer(ch) {
  pcEl.style.display = "flex";
  listEl.style.display = "none";
  shaka.polyfill.installAll();

  await enforceAutoLandscape();

  if (!shaka.Player.isBrowserSupported()) {
    showErrorMsg("Browser not supported.");
    return;
  }

  var playerLogo = document.querySelector(".channel-logo-overlay");
  if (playerLogo) {
    playerLogo.src = CUSTOM_LOGO;
  }

  setLoadMsg("Fetching structural cookies...");
  var masterConfig = await buildPlayerConfigs(ch.id);
  if (!masterConfig || !masterConfig.url) {
    showErrorMsg("Error: Channel pipeline not resolved!");
    return;
  }

  var player = new shaka.Player();
  globalPlayer = player;
  await player.attach(vidEl);

  var ui = new shaka.ui.Overlay(player, pcEl, vidEl);
  globalUi = ui;
  ui.configure({
    controlPanelElements: ["play_pause", "mute", "volume", "time_and_duration", "spacer", "fullscreen"],
    seekBarColors: { base: "rgba(255,255,255,0.15)", buffered: "rgba(56,189,248,0.4)", played: "#38bdf8" }
  });

  setTimeout(function () { 
    injectCustomControls(pcEl, vidEl, player); 
    setupSwipeGestures(pcEl, vidEl);
  }, 150);

  function buildConfigObj(cfg) {
    var baseCfg = {
      manifest: {
        defaultPresentationDelay: 3, 
        ignoreTextStreamFailures: true,
        retryParameters: { maxAttempts: 5, baseDelay: 800, backoffFactor: 1.3, fuzzFactor: 0.1 }
      },
      streaming: {
        lowLatencyMode:              false,
        bufferingGoal:               5,  
        rebufferingGoal:             1.2,
        safeSeekOffset:              3,
        stallEnabled:                true,
        stallThreshold:              1,
        stallSkip:                   0.5,
        inaccurateManifestTolerance: 0,
        retryParameters: { maxAttempts: 5, baseDelay: 800, backoffFactor: 1.3, fuzzFactor: 0.1 }
      },
      abr: {
        enabled: true,
        defaultBandwidthEstimate: 250000, 
        switchInterval: 2,
        restrictions: { maxHeight: 1080 }
      }
    };
    if (cfg.keyId && cfg.key) {
      baseCfg.drm = { clearKeys: { [cfg.keyId]: cfg.key } };
    }
    return baseCfg;
  }

  var isPlayed = false;

  for (var i = 0; i < masterConfig.cookies.length; i++) {
    var activeCookie = masterConfig.cookies[i];
    var activeRaw = extractRawCookie(activeCookie);
    showStatus("Connecting Node " + (i + 1) + "...", "warn", 1500);

    player.configure(buildConfigObj(masterConfig));
    player.getNetworkingEngine().clearAllRequestFilters();
    player.getNetworkingEngine().registerRequestFilter(function (type, req) {
      req.headers["Referer"]    = "https://www.jiotv.com/";
      req.headers["User-Agent"] = "plaYtv/7.1.5 (Linux;Android 13) ExoPlayerLib/2.11.6";
      if (activeCookie) req.headers["Cookie"] = activeCookie;
      if (type === shaka.net.NetworkingEngine.RequestType.MANIFEST || type === shaka.net.NetworkingEngine.RequestType.SEGMENT) {
        if (activeRaw) req.uris = req.uris.map(function (u) { return appendCookieToUri(u, activeRaw); });
      }
    });

    try {
      setLoadMsg("Spawning stream pipeline...");
      await player.load(masterConfig.url);
      vidEl.play().then(function() {
        showStatus("Live Connected!", "ok", 4000);
      }).catch(function () {
        console.log("Autoplay blocked, waiting for Tap gate.");
      });
      isPlayed = true;
      hideOverlay();
      break;
    } catch (e) {
      console.warn("Branch node " + (i + 1) + " failed to bind.", e);
    }
  }

  if (!isPlayed) {
    hideOverlay();
    showStatus("Playback Error: Verification Failed!", "err", 0);
    return;
  }

  // ==========================================
  // CLICK PLAY / UNMUTE TRIGGER WITH 2s DELAY POPUP
  // ==========================================
  tapGate.className = ""; 
  tapGate.addEventListener("click", function () {
    tapGate.classList.add("hidden");
    vidEl.muted = false; 
    if (vidEl.paused) vidEl.play().catch(function () {});

    // ठीक 2 सेकंड के बाद पॉपअप शो होगा
    setTimeout(function() {
      var waPopup = document.getElementById('waPopup');
      if (waPopup) waPopup.classList.add('show');
    }, 2000);
  }, { once: true });

  player.addEventListener("trackschanged", function() {
    buildYoutubeQualityMenu(player);
  });

  var stallTimer = null;
  var isRefreshing = false;
  var refreshCount = 0;
  var liveEdgeTried = false;

  function tryLiveEdgeRecovery() {
    if (isRefreshing) return;
    try {
      player.goToLive();
      liveEdgeTried = true;
      showStatus("Synchronizing...", "warn", 2000);
    } catch (e) {
      refreshAndReload();
    }
  }

  async function refreshAndReload() {
    if (isRefreshing) return;
    if (refreshCount >= 4) {
      showStatus("Stream unavailable.", "err", 0);
      return;
    }
    isRefreshing = true;
    refreshCount++;
    showStatus("Refreshing cluster...", "warn", 0);
    try {
      var freshConfig = await buildPlayerConfigs(ch.id);
      if (!freshConfig || !freshConfig.url) throw new Error();
      masterConfig = freshConfig;
      var targetCookie = masterConfig.cookies[0] || "";
      var targetRaw = extractRawCookie(targetCookie);

      player.configure(buildConfigObj(masterConfig));
      player.getNetworkingEngine().clearAllRequestFilters();
      player.getNetworkingEngine().registerRequestFilter(function (type, req) {
        req.headers["Referer"]    = "https://www.jiotv.com/";
        req.headers["User-Agent"] = "plaYtv/7.1.5 (Linux;Android 13) ExoPlayerLib/2.11.6";
        if (targetCookie) req.headers["Cookie"] = targetCookie;
        if (type === shaka.net.NetworkingEngine.RequestType.MANIFEST || type === shaka.net.NetworkingEngine.RequestType.SEGMENT) {
          if (targetRaw) req.uris = req.uris.map(function (u) { return appendCookieToUri(u, targetRaw); });
        }
      });

      await player.load(masterConfig.url);
      vidEl.play().catch(function () {});
      refreshCount  = 0;
      liveEdgeTried = false;
      showStatus("Live Restored", "ok", 4000);
    } catch (e) {
      setTimeout(refreshAndReload, 2000);
    } finally {
      isRefreshing = false;
    }
  }

  var RECOVERABLE = [1001, 1002, 1003, 6006, 6007, 7000, 7001, 7002];
  player.addEventListener("error", function (ev) {
    var err  = ev.detail;
    var code = err && err.code;
    if (RECOVERABLE.indexOf(code) !== -1) {
      refreshAndReload();
    } else {
      showStatus(shakaErrStr(err), "err", 6000);
    }
  });

  function onStall() {
    if (stallTimer || isRefreshing) return;
    showStatus("Buffering...", "warn", 0);
    stallTimer = setTimeout(function () {
      stallTimer = null;
      if (!liveEdgeTried) tryLiveEdgeRecovery();
      else refreshAndReload();
    }, 4000); 
  }

  function onPlaying() {
    if (stallTimer) { clearTimeout(stallTimer); stallTimer = null; }
    liveEdgeTried = false;
    showStatus("Live", "ok", 3000);
  }

  vidEl.addEventListener("waiting", onStall);
  vidEl.addEventListener("stalled", onStall);
  vidEl.addEventListener("playing", onPlaying);

  document.addEventListener("visibilitychange", function () {
    if (!document.hidden && vidEl.paused && !isRefreshing) {
      vidEl.play().catch(function () { refreshAndReload(); });
    }
  });
}

async function main() {
  // पॉपअप क्लोज करने वाले बटन्स का बाइंडिंग
  var pX = document.getElementById('popupX');
  var pJ = document.getElementById('popupJoin');
  var pA = document.getElementById('popupAlready');
  if (pX) pX.onclick = closePopup;
  if (pJ) pJ.onclick = closePopup;
  if (pA) pA.onclick = closePopup;

  var channelId = getChannelId();
  try {
    setLoadMsg("Syncing dynamic cloud catalog...");
    cachedChannels = await fetchInitialChannelList();
  } catch (e) {
    showErrorMsg("Database initialization failure.");
    return;
  }

  if (!channelId) {
    showChannelList(cachedChannels);
    return;
  }

  var ch = cachedChannels.find(function(c) { return c.id === channelId; });
  if (!ch) ch = { id: channelId, name: "Live Stream (" + channelId + ")", logo: CUSTOM_LOGO };

  document.title = ch.name;
  await startPlayer(ch);
}

document.addEventListener("DOMContentLoaded", main);
})();
</script>
</body></html>
